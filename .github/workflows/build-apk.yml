name: Build HermesPlayerBridge APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Sign with debug key
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Hermes, OU=Player, O=Hermes, L=Unknown, ST=Unknown, C=PL"
          jarsigner -keystore debug.keystore -storepass android -keypass android \
            app/build/outputs/apk/release/app-release-unsigned.apk debug

      - name: Align
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign -f -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/HermesPlayerBridge.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HermesPlayerBridge-APK
          path: app/build/outputs/apk/release/HermesPlayerBridge.apk
          retention-days: 30
