name: Build HermesPlayerBridge APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses + install SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.11.1"

      - name: Build release APK
        run: gradle assembleRelease

      - name: Create debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Hermes, OU=Player, O=Hermes, L=Unknown, ST=Unknown, C=PL"

      - name: Align + sign APK (v1+v2+v3 via apksigner)
        run: |
          # zipalign FIRST, then sign with apksigner
          $ANDROID_SDK_ROOT/build-tools/36.0.0/zipalign -f -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          $ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --ks-key-alias debug \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            app/build/outputs/apk/release/app-release-aligned.apk

      - name: Copy + verify APK
        run: |
          cp app/build/outputs/apk/release/app-release-aligned.apk \
             app/build/outputs/apk/release/HermesPlayerBridge.apk
          $ANDROID_SDK_ROOT/build-tools/36.0.0/apksigner verify --verbose \
            app/build/outputs/apk/release/HermesPlayerBridge.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HermesPlayerBridge-APK
          path: app/build/outputs/apk/release/HermesPlayerBridge.apk
          retention-days: 30
